server:
  port: 8090

spring:
  application:
    name: betsafe-gateway
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:betsafe}
    username: ${POSTGRES_USER:betsafe}
    password: ${POSTGRES_PASSWORD:betsafe_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5
        batch.size: 16384
    consumer:
      group-id: betsafe-ledger-consumer
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual_immediate

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: betsafe-gateway

betsafe:
  schema-registry:
    url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  tenants:
    - ladbrokes
    - coral
  rate-limits:
    default-eps: 100
    retry-after-ms: 1000
    tenants:
      ladbrokes: 500
      coral: 300
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin_secret}
    bucket-name: betsafe-events
  archive:
    flush-count: 1000
    flush-interval-seconds: 60
  kafka:
    topic-prefix: betsafe.events
    dlq-topic: betsafe.dlq.malformed
    partitions: 10
    retention-days: 7
    dlq-partitions: 3
    dlq-retention-days: 30
